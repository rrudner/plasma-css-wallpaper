<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #030814;
  }

  .abyss, .glow, .vignette { position: absolute; inset: 0; }

  /* Init frame: a static deep-sea gradient, darkest at the bottom with
     a faint hint of filtered light near the surface. Painted once,
     always shown, and looks complete on its own - this is the entire
     wallpaper when frozen. */
  .abyss {
    background: linear-gradient(to bottom, #0b2a3d 0%, #041724 40%, #010a12 75%, #000508 100%);
  }

  .glow {
    background:
      radial-gradient(ellipse 60% 35% at 30% 6%, rgba(90, 200, 220, 0.10) 0%, transparent 70%),
      radial-gradient(ellipse 50% 30% at 72% 3%, rgba(90, 200, 220, 0.07) 0%, transparent 70%);
  }

  .vignette {
    background: radial-gradient(ellipse 90% 90% at 50% 55%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.6) 100%);
  }

  /* Each bubble is sized to its own bounding box, not stretched across
     the screen - keeps the blended (fill-rate) area tiny regardless of
     how many are on screen at once. */
  .bubble {
    position: absolute;
    border-radius: 50%;
    will-change: transform;
  }
</style>
</head>
<body>
<div class="abyss"></div>
<div class="glow"></div>
<div id="bubbles"></div>
<div class="vignette"></div>
<script>
  const params    = new URLSearchParams(location.search);
  const targetFps = parseInt(params.get('fps'), 10) || 30;
  const frozen    = params.get('frozen') === '1';

  // See template.html: the WebEngineView may be rendered at a fraction
  // of the screen's real pixel size and scaled back up by Qt Quick, so
  // every fixed-pixel design constant (bubble size, speed, drift) is
  // multiplied by scaleFactor to keep the apparent on-screen look the
  // same regardless of the chosen render resolution.
  const scaleFactor = (parseInt(params.get('scale'), 10) || 100) / 100;

  // Second frame: rising bubbles. Entirely skipped when frozen - no
  // bubbles are created, no loop is started, so the page is fully
  // static from here on, same GPU cost as blank.html.
  if (!frozen) {
    const W = window.innerWidth, H = window.innerHeight;
    const container = document.getElementById('bubbles');
    const BUBBLE_COUNT = 26;

    const bubbles = Array.from({ length: BUBBLE_COUNT }, () => {
      const el   = document.createElement('div');
      const size = (3 + Math.random() * 10) * scaleFactor;

      el.className = 'bubble';
      el.style.width      = size + 'px';
      el.style.height     = size + 'px';
      // A bright glint near the upper-left plus a thin lit rim is what
      // reads as "bubble" rather than "glowing ember" - mostly
      // transparent center, brighter edge.
      el.style.background =
        'radial-gradient(circle at 35% 30%, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.05) 12%, ' +
        'rgba(180,230,255,0.05) 55%, rgba(180,230,255,0.35) 90%, rgba(180,230,255,0) 100%)';
      container.appendChild(el);

      return {
        el,
        half:   size / 2,
        x:      Math.random() * W,
        y:      H + Math.random() * H,
        speed:  (10 + Math.random() * 25) * scaleFactor,  // px/sec upward
        drift:  (Math.random() - 0.5) * 6 * scaleFactor,  // px/sec base sideways drift
        wobble: Math.random() * Math.PI * 2,
      };
    });

    function place(b) {
      b.el.style.transform = `translate3d(${b.x - b.half}px, ${b.y - b.half}px, 0)`;
    }
    bubbles.forEach(place);

    // Elapsed-time throttling, not a fixed tick count: rAF fires at
    // whatever the display's actual refresh rate is (60Hz, 144Hz,
    // ...), so hitting targetFps has to be driven by real time rather
    // than by counting ticks.
    const frameInterval = 1 / targetFps;
    let last = performance.now();
    let t = 0;

    function tick(now) {
      requestAnimationFrame(tick);

      const elapsed = (now - last) / 1000;
      if (elapsed < frameInterval) return;

      const dt = Math.min(elapsed, 0.1);
      last = now;
      t += dt;

      bubbles.forEach(b => {
        b.y -= b.speed * dt;
        b.x += (b.drift + Math.sin(t * 1.5 + b.wobble) * 8 * scaleFactor) * dt;
        if (b.y < -20 * scaleFactor) {
          b.y = H + 20 * scaleFactor;
          b.x = Math.random() * W;
        }
        place(b);
      });
    }

    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
